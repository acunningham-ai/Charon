# Charon first-run wizard — question definitions.
#
# This is the data model for `scripts/first-run.py`. Edit this file to add,
# remove, reword, or reorder questions; the wizard reads it on every run.
#
# Schema reference:
#   phases[]    — phase metadata (title, blurb shown before its questions)
#   questions[] — question records, each with:
#     id          — unique kebab-case id; templates reference this name
#     phase       — phase id (must match an entry in phases[])
#     prompt      — what the wizard asks (single line; keep concise)
#     description — longer "why we ask this" — shown on "?" or --explain
#     default     — default value when the user hits enter (string or null)
#                   special values:
#                     $cwd          → current working directory
#                     $home         → user's home directory
#                     $home/.secrets → standard secrets path
#     required    — must have a non-empty answer
#     skippable   — true if the user can skip even when required (some
#                   questions are non-skippable because downstream rules
#                   are non-functional without them, e.g. voice profile)
#     type        — string | multiline | path-dir | path-file | yes-no |
#                   choice | secret
#     choices     — for type=choice, list of allowed values
#     validate    — named validator: non_empty, writable_dir, exists_path,
#                   url, file_path. Multiple validators comma-separated.
#     populates   — list of write targets; templates rendered after all
#                   questions are answered, with {{question-id}} substitution

phases:
  - id: identity_paths
    title: Identity and paths
    blurb: |
      Four quick questions to anchor your identity in memory and tell the
      harness where your vault and secrets live. Everything else builds on
      these.

  - id: org_framework
    title: Org structure and framework
    blurb: |
      Your operating model: audience tiers (board / portfolio / customer /
      auditor), org-units (BUs / departments / accounts), security framework,
      and your source-of-truth dashboard. Skip any of these if not yet
      relevant — you can re-run the wizard later.

  - id: voice
    title: Voice profile
    blurb: |
      Six short questions to capture how you write. Without this, the
      voice-content rule can write competent prose but not yours.
      Not skippable — even three-word answers are useful.

  - id: workflow
    title: Workflow preferences and integrations
    blurb: |
      Your standing rules ("from now on always X"), tool exceptions, and
      optional integrations (capture pipeline, scheduled tasks). All skippable.

questions:
  # --- Phase 1: Identity and paths ---

  - id: identity_name
    phase: identity_paths
    prompt: "Your name (for memory attribution)"
    description: |
      Used to anchor voice + identity in user_role.md. Memory entries that
      reference "the user" will use this name when context calls for it.
    required: true
    skippable: false
    type: string
    validate: non_empty

  - id: identity_role
    phase: identity_paths
    prompt: "Your role / position (e.g. CISO, Head of Engineering, Independent advisor)"
    description: |
      Drives audience-tailoring. A CISO and a Head of Engineering need
      different default framings when writing to a board.
    required: true
    skippable: false
    type: string
    validate: non_empty

  - id: identity_org
    phase: identity_paths
    prompt: "Your organisation (short description, e.g. 'group of acquired ISVs', 'mid-sized health-tech', 'consulting solo practice')"
    description: |
      Short org descriptor used in stakeholder-facing docs and external bios.
      Stays high-level — no internal-only names.
    required: true
    skippable: false
    type: string
    validate: non_empty

  - id: vault_path
    phase: identity_paths
    prompt: "Where does your second-brain live?"
    description: |
      The directory that contains 02-BUs/ (or your org-unit equivalent),
      03-Domains/, 08-Projects/, etc. Sets HARNESS_VAULT_ROOT.
    default: $cwd
    required: true
    skippable: false
    type: path-dir
    validate: writable_dir

  - id: secrets_path
    phase: identity_paths
    prompt: "Where should credentials live? (Should be outside any cloud-synced folder)"
    description: |
      Sets HARNESS_SECRETS_DIR. The harness reads API keys + service
      credentials from JSON files in this directory at the moment of need.
      Never plaintext in vault or memory.
    default: $home/.secrets
    required: true
    skippable: false
    type: path-dir
    validate: writable_dir

  - id: anthropic_key_setup
    phase: identity_paths
    prompt: "Set up the Anthropic API key for save-on-mention now? (y/n)"
    description: |
      Optional — without this, the save-on-mention hook silently no-ops.
      Rules + memory still work. You can re-run this section later.
    default: "n"
    required: false
    skippable: true
    type: yes-no

  - id: anthropic_key_value
    phase: identity_paths
    prompt: "Paste your Anthropic API key (starts sk-ant-)"
    description: |
      Written to <secrets-path>/anthropic.json with restricted permissions.
      Never echoed back to screen, never logged.
    required: false
    skippable: true
    type: secret
    depends_on:
      anthropic_key_setup: "y"

  # --- Phase 2: Org structure and framework ---

  - id: org_unit_label
    phase: org_framework
    prompt: "What's your 'org-unit' concept? (BU / Department / Customer / Portfolio company / etc.)"
    description: |
      The harness uses 'org-unit' as a structural primitive throughout —
      routing captures, per-unit context, BU-style rollups. Name what's
      meaningful for your work.
    default: "Department"
    required: false
    skippable: true
    type: string

  - id: org_units
    phase: org_framework
    prompt: "List your org-units (one per line, blank line to finish)"
    description: |
      Names + optional rollup grouping. E.g.:
        HR
        Engineering
        Sales
        Support
      Used to seed reference_org_units.md.
    required: false
    skippable: true
    type: multiline

  - id: audience_tiers
    phase: org_framework
    prompt: "List your audience tiers (one per line — e.g. Board, Exec leadership, Customer, External auditor)"
    description: |
      Each tier gets a per-audience reminder in board-reporting / control
      translation skills. Skip and the harness falls back to a single
      generic audience.
    required: false
    skippable: true
    type: multiline

  - id: framework_name
    phase: org_framework
    prompt: "Your security framework (e.g. NIST CSF 2.0, ACME Maturity v2, Adapted CIS Top 18)"
    description: |
      If you do periodic reporting against a maturity framework, name it.
      Otherwise leave blank and the quarterly-report skill stays generic.
    required: false
    skippable: true
    type: string

  - id: framework_domains
    phase: org_framework
    prompt: "List your framework domains (one per line — e.g. IAM, Endpoint, Network, Backup)"
    description: |
      The categories your framework measures. Used by control-translate
      to anchor commentary by domain.
    required: false
    skippable: true
    type: multiline
    depends_on:
      framework_name: "*"

  - id: critical_controls
    phase: org_framework
    prompt: "List your critical-control set (one per line — typically 4-6: MFA, EDR, Backup, Patch, EOL, etc.)"
    description: |
      The small set you treat as cross-org-unit baseline. Lead stakeholder
      reports with these; per-org-unit domains underneath.
    required: false
    skippable: true
    type: multiline

  - id: dashboard_tool
    phase: org_framework
    prompt: "Your source-of-truth dashboard / GRC tool"
    description: |
      Where do your scores / verdicts live? Used to seed
      feedback_data_accuracy.md ("dashboard is source of truth; never
      compute"). Skip if you don't have one — the rule stays generic.
    required: false
    skippable: true
    type: string

  - id: tool_exceptions
    phase: org_framework
    prompt: "Any standardised tool exceptions? (vendors you DO name without 'or similar tool'; one per line as 'capability — vendor — reason')"
    description: |
      The harness defaults to 'X or similar tool' framing on every vendor
      recommendation. Named exceptions skip the framing for that vendor only.
      E.g.: 'EDR - <your EDR vendor> - org-wide contract'.
    required: false
    skippable: true
    type: multiline

  # --- Phase 3: Voice profile ---

  - id: voice_emphasis
    phase: voice
    prompt: "How do you signal emphasis in writing? (caps? italics? em-dashes? parens?)"
    description: |
      Voice-content rule reads this on every draft. Even one or two
      examples is enough — the rule pattern-matches your style.
    required: true
    skippable: false
    type: string
    validate: non_empty

  - id: voice_cadence
    phase: voice
    prompt: "Your sentence-length cadence (uniformly crisp? loose-and-rough? conversational drift?)"
    required: true
    skippable: false
    type: string
    validate: non_empty

  - id: voice_personality
    phase: voice
    prompt: "Personality moments — what do you DO that's distinctly you? (confessions, asides, winks, swears, callbacks)"
    required: true
    skippable: false
    type: multiline
    validate: non_empty

  - id: voice_refrains
    phase: voice
    prompt: "Recurring metaphors / refrains you use (one per line — blank if none)"
    required: false
    skippable: true
    type: multiline

  - id: voice_closer
    phase: voice
    prompt: "Your typical closer style (reflective? punchy line? question? short list?)"
    required: true
    skippable: false
    type: string
    validate: non_empty

  - id: voice_anti_voice
    phase: voice
    prompt: "What do you NOT want to sound like? (uniformly tight magazine prose? polished aphorisms? brand-voice?)"
    description: |
      Anti-voice is as informative as voice — tells the harness what to
      strip in review passes.
    required: true
    skippable: false
    type: multiline
    validate: non_empty

  # --- Phase 4: Workflow and integrations ---

  - id: org_specific_rules
    phase: workflow
    prompt: "Any standing workflow rules? (one per line — 'always X', 'never Y', 'when Z escalate to W')"
    description: |
      Each becomes a feedback_*.md entry indexed in MEMORY.md. You can add
      more later via the save-on-mention rule (every operational fact
      mentioned in chat).
    required: false
    skippable: true
    type: multiline

  - id: capture_pipeline_setup
    phase: workflow
    prompt: "Set up an automated email capture pipeline? (y/n)"
    description: |
      Pulls inbox + sent items from your email provider into your vault as
      markdown captures. Inbox is the day-to-day signal; sent items close
      the loop on what you've responded to and committed to.

      Provider-specific setup (app registrations, OAuth, IMAP settings):
      see EMAIL-PROVIDER-SETUP.md before answering yes.
    default: "n"
    required: false
    skippable: true
    type: yes-no

  - id: capture_pipeline_provider
    phase: workflow
    prompt: "Which email provider? (m365 / gmail / imap)"
    description: |
      - m365   — Microsoft 365 / Exchange Online. Device-code OAuth. Fully implemented.
      - gmail  — Gmail (Google Workspace or personal). OAuth desktop client. Skeleton — needs implementation. See EMAIL-PROVIDER-SETUP.md.
      - imap   — Generic IMAP (Outlook, Yahoo, FastMail, self-hosted, etc.). App password. Skeleton — needs implementation.

      Pick m365 today if that's your provider. For Gmail / IMAP the wizard
      generates the config scaffold; you'll need to fill in the provider
      implementation under capture-pipeline/lib/providers/.
    default: "m365"
    required: false
    skippable: true
    type: choice
    choices: [m365, gmail, imap]
    depends_on:
      capture_pipeline_setup: "y"

  - id: capture_sent_items
    phase: workflow
    prompt: "Capture sent items too? (recommended — gives time-management visibility) (y/n)"
    description: |
      Sent-items capture shows what you've responded to, what commitments
      you've made, and where threads stand from your side. The /refresh-todo
      and /triage-inbox skills surface threads you owe a reply on.

      Privacy / archive-only users can say no. Captured sent items live
      under 00-Inbox/_captured/email/ with a direction: outbound frontmatter
      flag, distinct from inbox captures (direction: inbound).
    default: "y"
    required: false
    skippable: true
    type: yes-no
    depends_on:
      capture_pipeline_setup: "y"

  # --- M365-specific config ---

  - id: m365_tenant_id
    phase: workflow
    prompt: "M365 tenant ID (or 'common' for personal accounts)"
    description: |
      Find this in Entra ID → Overview → Tenant ID (a UUID).
      Personal Microsoft accounts can use 'common'.
    required: false
    skippable: true
    type: string
    depends_on:
      capture_pipeline_provider: "m365"

  - id: m365_client_id
    phase: workflow
    prompt: "M365 registered app client ID (UUID)"
    description: |
      You need an app registration in Entra ID with delegated Mail.Read
      permission. See EMAIL-PROVIDER-SETUP.md §M365 for the full walk-through
      (app registration, redirect URIs, scopes, admin consent if required).
    required: false
    skippable: true
    type: string
    depends_on:
      capture_pipeline_provider: "m365"

  # --- Gmail-specific config ---

  - id: gmail_client_id
    phase: workflow
    prompt: "Gmail OAuth client ID (xxxxx.apps.googleusercontent.com)"
    description: |
      Create an OAuth client in Google Cloud Console (Desktop type), enable
      Gmail API on the project. See EMAIL-PROVIDER-SETUP.md §Gmail for the
      full walk-through. The provider implementation itself is a skeleton —
      you'll need to fill it in.
    required: false
    skippable: true
    type: string
    depends_on:
      capture_pipeline_provider: "gmail"

  - id: gmail_client_secret
    phase: workflow
    prompt: "Gmail OAuth client secret"
    description: |
      Stored locally in config.json — config.json is gitignored by the
      capture-pipeline so secrets do not commit. For tighter handling,
      move it to $HARNESS_SECRETS_DIR/gmail-client.json and reference
      from config after first-run.
    required: false
    skippable: true
    type: secret
    depends_on:
      capture_pipeline_provider: "gmail"

  # --- IMAP-specific config ---

  - id: imap_host
    phase: workflow
    prompt: "IMAP server host (e.g. imap.gmail.com, outlook.office365.com)"
    description: |
      Your provider's IMAP server. Common values:
        Gmail:   imap.gmail.com:993 (TLS, app password required)
        Outlook: outlook.office365.com:993 (TLS, app password required)
        Yahoo:   imap.mail.yahoo.com:993 (TLS, app password required)
      See EMAIL-PROVIDER-SETUP.md §IMAP for app-password generation steps.
    required: false
    skippable: true
    type: string
    depends_on:
      capture_pipeline_provider: "imap"

  - id: imap_user
    phase: workflow
    prompt: "IMAP username (usually your full email address)"
    required: false
    skippable: true
    type: string
    depends_on:
      capture_pipeline_provider: "imap"

  - id: imap_sent_folder
    phase: workflow
    prompt: "IMAP 'Sent' folder name (default: 'Sent')"
    description: |
      Provider-specific name. Common values: 'Sent' (most), 'Sent Items'
      (Outlook), '[Gmail]/Sent Mail' (Gmail IMAP), 'Sent Messages' (Apple Mail).
      Connect once with `node fetch-mail.mjs auth` to see your folder list.
    default: "Sent"
    required: false
    skippable: true
    type: string
    depends_on:
      capture_pipeline_provider: "imap"

  - id: imap_app_password
    phase: workflow
    prompt: "IMAP app password (NOT your main account password)"
    description: |
      Generated via your provider's security settings. Written to
      <secrets-path>/imap-app-password.txt with restricted permissions —
      not stored in config.json.
    required: false
    skippable: true
    type: secret
    depends_on:
      capture_pipeline_provider: "imap"

  # --- Pipeline schedule (applies to all providers) ---

  - id: pipeline_schedule_frequency
    phase: workflow
    prompt: "How often should the pipeline run? (daily / hourly / manual)"
    description: |
      - daily   — once per day at a chosen time. Most users. Pairs well with
                  morning-update / refresh-todo (your day starts with fresh captures).
      - hourly  — every hour. Useful if you want near-real-time threads, but
                  watch token quota on rate-limited providers.
      - manual  — no automation. You run `node fetch-mail.mjs all` when you want.

      You can change this any time by re-registering the scheduled task or
      editing the cron/launchd entry. The wizard records the choice; you wire
      it to your platform's scheduler (Task Scheduler / cron / launchd) — see
      EMAIL-PROVIDER-SETUP.md §Scheduling.
    default: "daily"
    required: false
    skippable: true
    type: choice
    choices: [daily, hourly, manual]
    depends_on:
      capture_pipeline_setup: "y"

  - id: pipeline_schedule_time
    phase: workflow
    prompt: "Daily run time? (24h HH:MM, e.g. 07:00)"
    description: |
      Time of day the daily capture run fires. 07:00 (morning) pairs well
      with /refresh-todo as part of your day-start routine. Use your local
      timezone; the scheduler runs the wrapper script which calls Node.
    default: "07:00"
    required: false
    skippable: true
    type: string
    depends_on:
      pipeline_schedule_frequency: "daily"

  - id: scheduled_tasks_setup
    phase: workflow
    prompt: "Set up scheduled tasks now? (capture, weekly-checkin, scheduled-audit) (y/n)"
    description: |
      Creates platform-appropriate task entries (Windows Task Scheduler /
      cron) for the standard recurring runners. Skippable; you can wire
      these later via CONFIGURATION.md.
    default: "n"
    required: false
    skippable: true
    type: yes-no

# --- Templates ---
# Each template renders to a file under <memory-root> or <vault-root>.
# {{question-id}} substitutions are applied with the user's answers.
# Multi-line answers are bullet-listed; empty answers omit the file.

templates:
  user_role:
    target: "<memory-root>/user_role.md"
    require_any:
      - identity_name
    body: |
      ---
      name: User role
      description: User's role, expertise, and how they collaborate with the harness
      type: user
      ---
      # User role

      - **Name:** {{identity_name}}
      - **Role:** {{identity_role}}
      - **Organisation:** {{identity_org}}

      Created by first-run wizard. Update freely as your role evolves.

  user_voice:
    target: "<memory-root>/user_voice.md"
    require_any:
      - voice_emphasis
      - voice_cadence
    body: |
      ---
      name: Voice profile
      description: User's writing style — read by voice-content rule on every draft
      type: user
      ---
      # Voice profile

      ## Emphasis
      {{voice_emphasis}}

      ## Sentence cadence
      {{voice_cadence}}

      ## Personality moments
      {{voice_personality}}

      ## Recurring refrains
      {{voice_refrains}}

      ## Closer style
      {{voice_closer}}

      ## Anti-voice (NOT this)
      {{voice_anti_voice}}

  reference_org_units:
    target: "<memory-root>/reference_org_units.md"
    require_any:
      - org_units
    body: |
      ---
      name: Org units
      description: Structural primitive for the harness — the user's org-unit list
      type: reference
      ---
      # {{org_unit_label}}s

      {{org_units}}

      Populated by first-run wizard. Edit freely.

  reference_audience_tiers:
    target: "<memory-root>/reference_audience_tiers.md"
    require_any:
      - audience_tiers
    body: |
      ---
      name: Audience tiers
      description: Per-tier framing reminders for stakeholder-facing artefacts
      type: reference
      ---
      # Audience tiers

      {{audience_tiers}}

      Populated by first-run wizard. Add per-tier lenses (what to
      emphasise, what to drop) as you learn each audience.

  reference_framework:
    target: "<memory-root>/reference_framework.md"
    require_any:
      - framework_name
    body: |
      ---
      name: Security framework
      description: User's nominated maturity / control framework + domains
      type: reference
      ---
      # Framework: {{framework_name}}

      ## Domains
      {{framework_domains}}

      Populated by first-run wizard. Calibration (per-domain targets,
      org-unit-specific tolerances) added as you score real cycles.

  reference_critical_controls:
    target: "<memory-root>/reference_critical_controls.md"
    require_any:
      - critical_controls
    body: |
      ---
      name: Critical controls
      description: Cross-org-unit baseline controls — headline for stakeholder reports
      type: reference
      ---
      # Critical controls

      {{critical_controls}}

      These are the apples-to-apples comparison across all your org-units.
      Lead stakeholder reports with these; full domain detail underneath.

  feedback_data_accuracy:
    target: "<memory-root>/feedback_data_accuracy.md"
    require_any:
      - dashboard_tool
    body: |
      ---
      name: Dashboard is source of truth
      description: Never compute scores; the dashboard tool is canonical
      type: feedback
      ---
      # Dashboard is source of truth

      **Tool:** {{dashboard_tool}}

      **Why:** Recomputing scores in the harness diverges from the source
      and causes costly mismatches in stakeholder reports.

      **How to apply:** When asked for scores / verdicts, ask the user to
      paste from {{dashboard_tool}}. Never recompute. Corrections go to
      the dashboard, not to a separate vault file.

  feedback_no_tool_mandate:
    target: "<memory-root>/feedback_no_tool_mandate.md"
    require_any:
      - tool_exceptions
    body: |
      ---
      name: Tool exceptions register
      description: Vendors named without the "or similar tool" framing
      type: feedback
      ---
      # Tool exceptions

      The harness defaults to "X or similar tool" framing on every vendor
      recommendation. The following are user-configured exceptions —
      vendors named directly because they're standardised:

      {{tool_exceptions}}

      Everything else gets the framing. If a vendor isn't on this list,
      treat the recommendation as capability-led ("an EDR tool — e.g.
      Vendor X or similar").

  feedback_org_rules:
    target: "<memory-root>/feedback_org_rules.md"
    require_any:
      - org_specific_rules
    body: |
      ---
      name: Standing workflow rules
      description: User-stated workflow rules to apply across sessions
      type: feedback
      ---
      # Standing workflow rules

      {{org_specific_rules}}

      Add more via save-on-mention — every "from now on" / "always X" /
      "never Y" the user states in chat lands here in the same turn.

  capture_pipeline_config:
    target: "<repo-root>/capture-pipeline/config.json"
    require_any:
      - capture_pipeline_provider
    body: |
      {
        "_comment": "Generated by first-run wizard. Edit freely. See EMAIL-PROVIDER-SETUP.md for provider-specific details.",
        "vaultRoot": "{{vault_path}}",
        "stateFile": "state/captured.json",
        "auditLog": "state/audit.log",
        "captureWindow": {
          "start": "2026-01-01"
        },
        "capture": {
          "inbox": true,
          "sent": true,
          "_sent_note": "Set sent: false if you only want inbox captures. Default on — provides time-management visibility (what you've responded to, what threads you owe replies on)."
        },
        "provider": {
          "name": "{{capture_pipeline_provider}}"
        },
        "m365": {
          "tenantId": "{{m365_tenant_id}}",
          "clientId": "{{m365_client_id}}",
          "scopes": ["Mail.Read", "User.Read"],
          "tokenCacheFile": "state/m365-token-cache.json",
          "inboxPageSize": 250,
          "sentPageSize": 250
        },
        "gmail": {
          "_comment": "Implement lib/providers/gmail.mjs before using. clientSecret should be moved to a secrets file after first-run.",
          "clientId": "{{gmail_client_id}}",
          "clientSecretFile": "<your secrets dir>/gmail-client-secret.txt",
          "refreshTokenFile": "state/gmail-refresh-token.json",
          "scopes": ["https://www.googleapis.com/auth/gmail.readonly"]
        },
        "imap": {
          "_comment": "Implement lib/providers/imap.mjs before using. App password lives in passwordSecretFile, NOT inline.",
          "host": "{{imap_host}}",
          "port": 993,
          "secure": true,
          "user": "{{imap_user}}",
          "passwordSecretFile": "<your secrets dir>/imap-app-password.txt",
          "inboxFolder": "INBOX",
          "sentFolder": "{{imap_sent_folder}}"
        },
        "vaultPaths": {
          "emailRoot": "00-Inbox/_captured/email",
          "emailDomain": "00-Inbox/_captured/email/_domain",
          "emailUncertain": "00-Inbox/_captured/email/_uncertain"
        },
        "senderBlocklist": [
          "^noreply@",
          "^no-reply@",
          "^donotreply@",
          "@notify\\.",
          "@bounce\\.",
          "@notifications\\.",
          "@newsletter\\."
        ],
        "sensitivity": {
          "default": "confidential",
          "restrictedKeywords": [
            "incident", "breach", "ransomware", "privileged", "subpoena", "audit committee", "board pack"
          ]
        },
        "domainKeywordMap": {
          "Compliance": ["soc 2", "iso 27001", "compliance", " audit "],
          "Vendor-Management": ["vendor", "third-party", "tprm", "contract"],
          "Security": ["edr", "siem", "mfa", "security"]
        },
        "orgUnitDomainMap": {
          "_comment": "Populate with email-domain → org-unit mappings. See README in capture-pipeline/."
        }
      }

# --- Env var configuration ---
# What gets exported to the user's shell profile after the wizard.

env_vars:
  - name: HARNESS_VAULT_ROOT
    value_from: vault_path
  - name: HARNESS_SECRETS_DIR
    value_from: secrets_path
